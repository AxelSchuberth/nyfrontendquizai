<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator</title>
    <script>
        (() => {
            try {
                const supportedThemes = ["light", "dark"];
                const savedTheme = window.localStorage.getItem("theme");
                const theme = savedTheme === "dracula" || savedTheme === "dark"
                    ? "dark"
                    : supportedThemes.includes(savedTheme) ? savedTheme : "light";
                document.documentElement.setAttribute("data-theme", theme);
            } catch (error) {
                document.documentElement.setAttribute("data-theme", "light");
            }
        })();
    </script>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/favicon.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='themes/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='themes/light.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='themes/dark.css') }}">
</head>
<body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="{{ url_for('static', filename='i18n/en.js') }}"></script>
    <script src="{{ url_for('static', filename='i18n/sv.js') }}"></script>
    <script type="text/babel" data-presets="env,react" src="{{ url_for('static', filename='App.jsx') }}"></script>
</body>
</html>
